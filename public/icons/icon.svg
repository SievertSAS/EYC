<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <!-- Gradiente púrpura-naranja del logo Sievert -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3B2D8F"/>
      <stop offset="50%" style="stop-color:#825AF2"/>
      <stop offset="100%" style="stop-color:#6B3FD4"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#FFFFFF"/>
      <stop offset="60%" style="stop-color:#F0E6FF"/>
      <stop offset="100%" style="stop-color:#F59E0B"/>
    </linearGradient>
    <!-- Glow sutil detrás del texto -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Arco decorativo estilo globo -->
    <linearGradient id="arcGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F59E0B;stop-opacity:0.6"/>
      <stop offset="100%" style="stop-color:#825AF2;stop-opacity:0.3"/>
    </linearGradient>
  </defs>

  <!-- Fondo con esquinas redondeadas -->
  <rect width="512" height="512" rx="108" fill="url(#bg)"/>

  <!-- Arco decorativo inspirado en el globo del logo -->
  <ellipse cx="380" cy="256" rx="160" ry="200" fill="none" stroke="url(#arcGrad)" stroke-width="3" opacity="0.5"/>
  <ellipse cx="256" cy="256" rx="220" ry="220" fill="none" stroke="white" stroke-width="1" opacity="0.06"/>

  <!-- Texto EYC -->
  <text x="248" y="310" font-family="Inter,system-ui,-apple-system,sans-serif" font-size="180" font-weight="900" fill="url(#textGrad)" text-anchor="middle" letter-spacing="-8" filter="url(#glow)">EYC</text>

  <!-- Punto de acento naranja (like radiation dot) -->
  <circle cx="430" cy="100" r="22" fill="#F59E0B" opacity="0.85"/>
  <circle cx="430" cy="100" r="8" fill="white" opacity="0.5"/>

  <!-- Línea decorativa inferior -->
  <line x1="100" y1="370" x2="412" y2="370" stroke="#F59E0B" stroke-width="3" opacity="0.4" stroke-linecap="round"/>
</svg>
