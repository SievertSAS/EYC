<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sin conexion — Sievert EyC</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: linear-gradient(135deg, #f8f7ff 0%, #f1eeff 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      color: #1e293b;
    }
    .card {
      background: #fff;
      border-radius: 24px;
      padding: 48px 32px;
      max-width: 420px;
      width: 100%;
      text-align: center;
      box-shadow: 0 4px 24px rgba(130, 90, 242, 0.08);
    }
    .icon {
      width: 64px;
      height: 64px;
      background: rgba(130, 90, 242, 0.1);
      border-radius: 20px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 24px;
    }
    .icon svg { width: 32px; height: 32px; color: #825af2; }
    h1 {
      font-size: 22px;
      font-weight: 900;
      letter-spacing: -0.02em;
      margin-bottom: 8px;
    }
    p {
      font-size: 14px;
      color: #64748b;
      line-height: 1.5;
      margin-bottom: 24px;
    }
    .btn {
      display: inline-block;
      padding: 12px 28px;
      background: #825af2;
      color: #fff;
      font-size: 13px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      border: none;
      border-radius: 14px;
      cursor: pointer;
      transition: background 0.2s;
    }
    .btn:hover { background: #6d42e0; }
    .brand {
      margin-top: 32px;
      font-size: 11px;
      color: #94a3b8;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">
      <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round"
          d="M18.364 5.636a9 9 0 010 12.728M5.636 18.364a9 9 0 010-12.728M8.464 15.536a5 5 0 010-7.072M15.536 8.464a5 5 0 010 7.072" />
        <line x1="4" y1="4" x2="20" y2="20" stroke-linecap="round" />
      </svg>
    </div>
    <h1>Sin conexion</h1>
    <p>No hay conexion a internet en este momento. Tus datos locales estan seguros y se sincronizaran cuando vuelvas a conectarte.</p>
    <button class="btn" onclick="window.location.reload()">Reintentar</button>
    <div class="brand">Sievert Proteccion Radiologica</div>
  </div>
</body>
</html>
